# vello-llama stack: llama.cpp + Open WebUI.
#
# This file declares TWO mutually exclusive llama-server runtimes, picked at
# runtime via docker compose profiles:
#
#   --profile cuda  → llama-server-cuda  (NVIDIA GPU, CUDA 12.4)
#   --profile cpu   → llama-server-cpu   (no GPU, runs anywhere)
#
# Only one ever runs at a time (both publish container_name=llama-server, so
# Open WebUI can always reach http://llama-server:8080 internally).
#
# Variables come from .env, which is generated by `vello apply` from
# system.toml + the active model's [runtime] + profile.toml. Don't edit .env
# by hand. The COMPOSE_PROFILES line in the generated .env selects which
# runtime `docker compose up` activates without needing --profile on the CLI.

name: vello-llama

services:
  llama-server-cuda:
    profiles: ["cuda"]
    build:
      context: .
      dockerfile: docker/Dockerfile.llama-cuda
      args:
        # CUDA toolkit version. Must be <= what your NVIDIA driver supports.
        # Driver 550.x   -> CUDA 12.4 (this default works)
        # Driver 555.x+  -> can bump to 12.6 if desired
        CUDA_VERSION: 12.4.1
        # CUDA architecture. 89 = RTX 4060/4070/4080/4090 (Ada Lovelace).
        # 86 = RTX 3060/3070/3080/3090 (Ampere). 75 = RTX 2060/2070/2080 (Turing).
        CUDA_ARCH: "89"
    image: vello/llama-server-cuda:12.4
    container_name: llama-server
    ports:
      - "${LLAMA_PORT:-8080}:8080"
    volumes:
      - ./models:/models:ro
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        exec /app/llama-server
        --host 0.0.0.0
        --port 8080
        --model /models/${LLAMA_MODEL_FILE}
        --alias ${LLAMA_MODEL_ALIAS:-local-model}
        --ctx-size ${LLAMA_CTX:-32768}
        --n-gpu-layers ${LLAMA_NGL:-99}
        --threads ${LLAMA_THREADS:-6}
        --batch-size ${LLAMA_BATCH:-2048}
        --ubatch-size ${LLAMA_UBATCH:-512}
        --flash-attn ${LLAMA_FLASH_ATTN:-on}
        --cache-type-k ${LLAMA_KV_CACHE_K:-q8_0}
        --cache-type-v ${LLAMA_KV_CACHE_V:-q8_0}
        --jinja
        --metrics
        ${LLAMA_EXTRA_ARGS:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 90s

  llama-server-cpu:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: docker/Dockerfile.llama-cpu
    image: vello/llama-server-cpu:latest
    container_name: llama-server
    ports:
      - "${LLAMA_PORT:-8080}:8080"
    volumes:
      - ./models:/models:ro
    entrypoint: ["/bin/sh", "-c"]
    # CPU command: no --n-gpu-layers, no --flash-attn (CPU build may not
    # support flash-attn; defaulting off is safer). Threads/batch tuned for
    # CPU by the resolver in CPU mode (smaller batches, more threads).
    command:
      - >
        exec /app/llama-server
        --host 0.0.0.0
        --port 8080
        --model /models/${LLAMA_MODEL_FILE}
        --alias ${LLAMA_MODEL_ALIAS:-local-model}
        --ctx-size ${LLAMA_CTX:-8192}
        --threads ${LLAMA_THREADS:-6}
        --batch-size ${LLAMA_BATCH:-512}
        --ubatch-size ${LLAMA_UBATCH:-128}
        --cache-type-k ${LLAMA_KV_CACHE_K:-q8_0}
        --cache-type-v ${LLAMA_KV_CACHE_V:-q8_0}
        --jinja
        --metrics
        ${LLAMA_EXTRA_ARGS:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  open-webui:
    profiles: ["cuda", "cpu"]
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - ./openwebui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://llama-server:8080/v1
      - OPENAI_API_KEY=local-no-auth
      - ENABLE_OPENAI_API=true
      - ENABLE_OLLAMA_API=false
      - WEBUI_AUTH=${WEBUI_AUTH:-False}
      - DEFAULT_MODELS=${LLAMA_MODEL_ALIAS:-local-model}
    depends_on:
      llama-server-cuda:
        condition: service_healthy
        required: false
      llama-server-cpu:
        condition: service_healthy
        required: false
    restart: unless-stopped
