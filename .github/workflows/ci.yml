name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: quality-gate (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --component rustfmt --component clippy
          rustup default ${{ matrix.rust }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vello-cli/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('vello-cli/Cargo.lock', 'vello-cli/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Build vello binary (needed by quality.sh catalog-validate step)
        run: |
          cd vello-cli && cargo build --release
          cd .. && ln -sf vello-cli/target/release/vello vello

      - name: Run quality gate
        run: ./scripts/quality.sh

      - name: Verify project structure invariants
        if: always()
        run: |
          test -x vello-installer || { echo "vello-installer missing executable bit"; exit 1; }
          head -1 vello-installer | grep -q '^#!/usr/bin/env bash' || { echo "vello-installer missing bash shebang"; exit 1; }
          test -f catalogs/default.toml || { echo "catalogs/default.toml missing"; exit 1; }
          # No legacy artifacts should creep back in.
          test ! -f catalog.json || { echo "catalog.json should have been removed"; exit 1; }
          test ! -f .env.example || { echo ".env.example should have been removed"; exit 1; }
          test ! -f system.toml.example || { echo "system.toml.example should have been removed"; exit 1; }

      - name: Verify zero unwrap()/panic!() in src/ (excluding tests)
        if: always()
        run: |
          # Catches accidental unwrap/panic in non-test code. Tests are allowed.
          if grep -rnE '\.unwrap\(\)|panic!\(' vello-cli/src \
              --include='*.rs' \
              | grep -v '#\[cfg(test)\]' \
              | grep -v '^\s*//' \
              | awk -F: '{
                  # Skip lines inside test modules. Crude but effective: any
                  # file where the line follows `mod tests {` is excluded.
                  print $0
                }' > /tmp/unwrap-hits || true
          # Whitelist: schema serde defaults legitimately use unwrap_or_else.
          # We're looking only for raw unwrap()/panic!().
          if [[ -s /tmp/unwrap-hits ]]; then
            # Filter out unwrap_or, unwrap_or_else, unwrap_or_default which are fine.
            real=$(grep -vE '\.unwrap_(or|or_else|or_default)' /tmp/unwrap-hits || true)
            # Also filter out anything in tests modules. Detect by checking if
            # the file contains `mod tests` and the line number is after it.
            # Simpler: ignore lines that contain `mod tests` themselves and trust
            # that test code is gated behind #[cfg(test)] which clippy enforces.
            real=$(echo "$real" | grep -v '/tests/' || true)
            if [[ -n "$real" ]]; then
              # Cross-check: in our codebase, unwrap() in tests is acceptable.
              # Strip lines from test modules by extracting the module gate.
              filtered=""
              while IFS= read -r line; do
                [[ -z "$line" ]] && continue
                file=$(echo "$line" | cut -d: -f1)
                lineno=$(echo "$line" | cut -d: -f2)
                # Find the nearest preceding `#[cfg(test)]` or `mod tests {` line.
                gate=$(awk -v target="$lineno" '
                  /#\[cfg\(test\)\]/ || /^mod tests/ { last=NR }
                  NR==target { print last; exit }
                ' "$file")
                if [[ -z "$gate" || "$gate" == "0" ]]; then
                  filtered+="$line"$'\n'
                fi
              done <<< "$real"
              if [[ -n "${filtered// }" ]]; then
                echo "Found unwrap()/panic!() in non-test code:" >&2
                echo "$filtered" >&2
                exit 1
              fi
            fi
          fi
          echo "ok: no raw unwrap()/panic!() in non-test code"

      - name: Upload quality-reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-rust-${{ matrix.rust }}
          path: quality-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Build PR comment body
        if: always() && github.event_name == 'pull_request' && hashFiles('quality-reports/summary.md') != ''
        env:
          PR_COMMENT_HEADING: 'Quality Gate — Rust ${{ matrix.rust }}'
        run: ./scripts/pr-comment.sh > pr-comment.md

      - name: Post quality-gate result to PR
        if: always() && github.event_name == 'pull_request' && hashFiles('pr-comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: quality-gate-rust-${{ matrix.rust }}
          path: pr-comment.md

      - name: Append summary to GitHub UI
        if: always() && hashFiles('quality-reports/summary.md') != ''
        run: |
          {
            echo "## Quality Gate Summary"
            echo
            cat quality-reports/summary.md
          } >> "$GITHUB_STEP_SUMMARY"

  # Required gate so branch protection can require this single check.
  required:
    name: required
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()
    steps:
      - name: Fail if any quality-gate matrix job failed
        run: |
          if [[ "${{ needs.quality-gate.result }}" != "success" ]]; then
            echo "Quality gate failed (result=${{ needs.quality-gate.result }})"
            exit 1
          fi
          echo "Quality gate passed."
